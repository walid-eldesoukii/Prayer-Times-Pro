<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مواقيت الصلاة | Prayer Times</title>
    <script src="./node_modules/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="welcomeMessage">مرحبا بك في موقع تواقيت الصلاة</div>
    </header>
    <div class="selectionsContainer">
        <div class="nationalitySelector">
                <label for="nationalitySelector">اختر الدولة :</label>
                <select id="nationalitySelector">
                    <option value="Egypt">مصر</option>
                    <!-- <option value="Saudi Arabia">السعودية</option>
                    <option value="UAE">الامارات</option>
                    <option value="Kuwait">الكويت</option> -->
                </select>
            </div>
        <div class="citySelector">
                <label for="citySelector">اختر المدينة:</label>
                <select id="citySelector">
                    <option value="Cairo">القاهرة</option>
                    <option value="Alexandria">الإسكندرية</option>
                    <option value="Aswan">أسوان</option>
                    <option value="Mansoura">المنصورة</option>
                </select>
            </div>
    </div>
    <section>
        <div class="prayerContainer">
            <div class="fajrContainer">
                <div class="name">الفجر</div>
                <div class="time">00:00</div>
            </div>
            <div class="shroukContainer">
                <div class="name">الشروق</div>
                <div class="time">00:00</div>
            </div>
            <div class="zohrContainer">
                <div class="name">الظهر</div>
                <div class="time">00:00</div>
            </div>
            <div class="asrContainer">
                <div class="name">العصر</div>
                <div class="time">00:00</div>
            </div>
            <div class="magrebContainer">
                <div class="name">المغرب</div>
                <div class="time">00:00</div>
            </div>
            <div class="eshaaContainer">
                <div class="name">العشاء</div>
                <div class="time">00:00</div>
            </div>
        </div>
    </section>
    <script src="main.js"></script>
</body>
</html>
